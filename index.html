<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime Route Delivery Services - Coming Soon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #0b0c10;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }
        /* Background decorative elements */
        body::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(229, 193, 88, 0.08) 0%, rgba(0,0,0,0) 70%);
            top: 10%;
            left: 10%;
            z-index: 0;
        }
        body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(229, 193, 88, 0.05) 0%, rgba(0,0,0,0) 70%);
            bottom: 10%;
            right: 5%;
            z-index: 0;
        }
        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
            z-index: 1;
            background: rgba(20, 22, 26, 0.6);
            padding: 40px 30px;
            border-radius: 16px;
            border: 1px solid rgba(225, 193, 88, 0.1);
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .logo-container {
            margin-bottom: 40px;
        }
        .logo {
            max-width: 100%;
            height: auto;
            width: 600px;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.6));
        }
        .coming-soon {
            font-size: 2.5rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 6px;
            margin-bottom: 20px;
            color: #ffffff;
            position: relative;
            display: inline-block;
        }
        .coming-soon::after {
            content: '';
            display: block;
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, #c5a059, #f3dc9b);
            margin: 15px auto 0 auto;
            border-radius: 2px;
        }
        .subtitle {
            font-size: 1.1rem;
            color: #a0a5b5;
            font-weight: 300;
            margin-bottom: 45px;
            letter-spacing: 1px;
            line-height: 1.6;
        }
        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
            justify-content: center;
            margin-top: 30px;
        }
        @media(min-width: 600px) {
            .contact-info {
                flex-direction: row;
                gap: 30px;
            }
        }
        .contact-card {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.03);
            padding: 14px 24px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            text-decoration: none;
            color: #e0e0e0;
            transition: all 0.3s ease;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        .contact-card:hover {
            background: rgba(229, 193, 88, 0.1);
            border-color: rgba(229, 193, 88, 0.4);
            color: #e5c158;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(229, 193, 88, 0.1);
        }
        .icon {
            width: 20px;
            height: 20px;
            fill: #e5c158;
        }
        .footer {
            margin-top: 50px;
            font-size: 0.85rem;
            color: #555c66;
            letter-spacing: 1px;
        }
    </style>
</head>
