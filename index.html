<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prime Route Delivery Services</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:#0f1117;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    overflow:hidden;
    position:relative;
}

/* Background */
body::before{
    content:'';
    position:absolute;
    inset:0;
    background:
    radial-gradient(circle at top,#3b3b3b33 0%,transparent 40%),
    radial-gradient(circle at bottom,#d4af3715 0%,transparent 35%);
}

.container{
    position:relative;
    z-index:2;
    width:90%;
    max-width:850px;
    background:rgba(18,20,28,.85);
    border:1px solid rgba(212,175,55,.2);
    backdrop-filter:blur(10px);
    border-radius:20px;
    padding:50px;
    text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,.5);
}

.logo{
    width:100%;
    max-width:650px;
    margin-bottom:40px;
}

h1{
    font-size:56px;
    color:#d4af37;
    letter-spacing:4px;
    margin-bottom:10px;
}

.subtitle{
    color:#ddd;
    font-size:20px;
    margin-bottom:40px;
}

.divider{
    width:120px;
    height:3px;
    background:#d4af37;
    margin:0 auto 40px;
}

.contact{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
}

.card{
    background:#1b1f2a;
    border:1px solid rgba(212,175,55,.25);
    border-radius:15px;
    padding:20px 30px;
    min-width:280px;
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
    border-color:#d4af37;
}

.label{
    color:#d4af37;
    font-size:14px;
    text-transform:uppercase;
    letter-spacing:2px;
    margin-bottom:8px;
}

.value{
    font-size:18px;
    color:#fff;
    word-break:break-word;
}

footer{
    margin-top:45px;
    color:#999;
    font-size:14px;
}

@media(max-width:700px){

.container{
padding:30px 20px;
}

h1{
font-size:38px;
}

.subtitle{
font-size:18px;
}

.card{
width:100%;
}

}
</style>
</head>

<body>

<div class="container">

<img src="logo.jpg" class="logo" alt="Prime Route Delivery Services">

<h1>COMING SOON</h1>

<p class="subtitle">
Our new website is currently under development.<br>
We're preparing something exceptional.
</p>

<div class="divider"></div>

<div class="contact">

<div class="card">
<div class="label">Email</div>
<div class="value">
primerouteds@gmail.com
</div>
</div>

<div class="card">
<div class="label">Phone</div>
<div class="value">
+971 56 122 5005
</div>
</div>

</div>

<footer>
© 2026 Prime Route Delivery Services<br>
Fast. Safe. On Time.
</footer>

</div>

</body>
</html>
